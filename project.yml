name: EmbyWikiWebView
options:
  minimumXcodeGenVersion: 2.37.0
  deploymentTarget:
    iOS: "13.0"
  createIntermediateGroups: true
attributes:
  ORGANIZATIONNAME: walnut
settings:
  base:
    DEVELOPMENT_TEAM: ""
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "13.0"
targets:
  EmbyWikiWebView:
    type: application
    platform: iOS
    deploymentTarget: "13.0"
    sources:
      - EmbyWikiWebView/AppConfig.swift
      - EmbyWikiWebView/AppDelegate.swift
      - EmbyWikiWebView/SceneDelegate.swift
      - EmbyWikiWebView/ViewController.swift
    resources:
      - EmbyWikiWebView/Assets.xcassets
      - EmbyWikiWebView/Base.lproj/LaunchScreen.storyboard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.walnut.emby10086wiki
        PRODUCT_NAME: EmbyWikiWebView
        INFOPLIST_FILE: EmbyWikiWebView/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: ""
        DEVELOPMENT_TEAM: ""
    scheme:
      testTargets: []
      gatherCoverageData: false
