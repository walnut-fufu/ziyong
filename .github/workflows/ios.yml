name: Build unsigned iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: |
          brew update
          brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned app
        run: |
          xcodebuild \
            -project EmbyWikiWebView.xcodeproj \
            -scheme EmbyWikiWebView \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            clean build

      - name: Check app icon output
        run: |
          echo "Checking generated app icons..."
          find build/Build/Products/Release-iphoneos/EmbyWikiWebView.app -maxdepth 1 -iname "AppIcon*" -print || true
          /usr/libexec/PlistBuddy -c "Print :CFBundleIcons" build/Build/Products/Release-iphoneos/EmbyWikiWebView.app/Info.plist || true

      - name: Pack unsigned IPA
        run: |
          rm -rf Payload EmbyWikiWebView-unsigned.ipa
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/EmbyWikiWebView.app Payload/EmbyWikiWebView.app
          /usr/bin/zip -qry EmbyWikiWebView-unsigned.ipa Payload
          ls -lh EmbyWikiWebView-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: EmbyWikiWebView-unsigned-ipa
          path: EmbyWikiWebView-unsigned.ipa
          if-no-files-found: error
          retention-days: 7iles-found: error
          retention-days: 7

